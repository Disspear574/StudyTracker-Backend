ktor {
    deployment {
        port = 8080
        port = ${?HTTP_PORT}
    }
    application {
        modules = [ com.studytracker.ApplicationKt.module ]
    }
}

app {
    env = "dev"
    env = ${?APP_ENV}
}

db {
    url = "jdbc:postgresql://localhost:5432/studytracker"
    url = ${?DATABASE_URL}
    user = "studytracker"
    user = ${?DB_USER}
    password = "change_me"
    password = ${?DB_PASSWORD}
    poolSize = "10"
    poolSize = ${?DB_POOL_SIZE}
}

jwt {
    secret = "dev_secret_change_me_to_a_long_random_value"
    secret = ${?JWT_SECRET}
    issuer = "studytracker"
    issuer = ${?JWT_ISSUER}
    audience = "studytracker-app"
    audience = ${?JWT_AUDIENCE}
    accessTtlSeconds = "3600"
    accessTtlSeconds = ${?ACCESS_TOKEN_TTL}
    refreshTtlSeconds = "2592000"
    refreshTtlSeconds = ${?REFRESH_TOKEN_TTL}
}

minio {
    endpoint = "http://localhost:9000"
    endpoint = ${?MINIO_ENDPOINT}
    accessKey = "change_me"
    accessKey = ${?MINIO_ACCESS_KEY}
    secretKey = "change_me"
    secretKey = ${?MINIO_SECRET_KEY}
    avatarsBucket = "studytracker-avatars"
    avatarsBucket = ${?MINIO_BUCKET_AVATARS}
}
